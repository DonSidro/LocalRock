#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
# -Xss64m avoids a StackOverflowError in Gradle's btree cache (FreeListBlockStore.alloc) seen on
# this machine, and keeps CLI + Android Studio on one shared daemon (fewer journal-lock conflicts).
org.gradle.jvmargs=-Xmx4096M -Xss64m -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true